<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado - Royale</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --bg-chat: #212121;
            --bg-msg-user: #10a37f; 
            --bg-msg-other: #2f2f2f; 
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --border-color: #424242;
            --input-bg: #2f2f2f;
            --accent-color: #10a37f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Pantalla de Login */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--bg-main);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .login-box h2 { margin-bottom: 1.5rem; font-size: 1.8rem; }
        
        select, input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        select:focus, input:focus { border-color: var(--accent-color); }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background: #1a7f64; }
        .btn-danger { background: #c0392b; margin-bottom: 0.5rem; }
        .btn-danger:hover { background: #a93226; }
        .btn-secondary { background: #4a4a4a; }
        .btn-secondary:hover { background: #3a3a3a; }

        .error-msg { color: #e74c3c; margin-bottom: 1rem; display: none; font-size: 0.9rem; }

        /* Contenedor Principal */
        #app-container {
            display: none; 
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            border-right: 1px solid var(--border-color);
        }

        .sidebar-top h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .chat-list-item {
            background: #2f2f2f;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        /* Área de Chat */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
            position: relative;
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 5%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Estilo de Mensajes Izquierda / Derecha */
        .message-row {
            display: flex;
            gap: 1rem;
            max-width: 70%;
        }

        .message-row.received-row {
            align-self: flex-start;
            flex-direction: row;
        }
        .message-row.received-row .message-content {
            background-color: var(--bg-msg-other);
            border-radius: 0px 12px 12px 12px;
        }

        .message-row.sent-row {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-row.sent-row .message-content {
            background-color: var(--bg-msg-user);
            border-radius: 12px 0px 12px 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .avatar.prince { background-color: #3498db; color: white; }
        .avatar.princess { background-color: #e91e63; color: white; }

        .message-content {
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .sender-name {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        .sent-row .sender-name {
            color: #e0f2f1;
            text-align: right;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-text a {
            color: #58a6ff;
            text-decoration: underline;
        }
        .sent-row .message-text a {
            color: #fff;
        }

        .timestamp {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
        }
        .sent-row .timestamp {
            color: #b2dfdb;
        }

        /* Input Area */
        .input-area {
            padding: 1.5rem 5%;
            background: var(--bg-chat);
        }

        .input-container {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding-right: 10px;
        }

        .input-container input {
            border: none;
            background: transparent;
            margin-bottom: 0;
            padding: 14px;
            flex: 1;
        }

        .input-container button {
            width: auto;
            margin-bottom: 0;
            padding: 8px 14px;
            background: transparent;
            color: var(--text-muted);
        }

        .input-container input:focus + button, 
        .input-container button:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE AUTENTICACIÓN -->
    <div id="login-screen">
        <div class="login-box">
            <h2><i class="fa-solid fa-lock" style="color: var(--accent-color);"></i> Acceso al Chat</h2>
            <div class="error-msg" id="login-error">Contraseña incorrecta. Inténtalo de nuevo.</div>
            
            <label style="display:block; text-align:left; margin-bottom:5px; color:var(--text-muted)">Selecciona tu Usuario:</label>
            <select id="user-select">
                <option value="Príncipe">Príncipe</option>
                <option value="Princesa">Princesa</option>
            </select>

            <label style="display:block; text-align:left; margin-bottom:5px; color:var(--text-muted)">Contraseña:</label>
            <input type="password" id="password-input" placeholder="Introduce la contraseña única...">
            
            <button onclick="tryLogin()">Entrar al Chat</button>
        </div>
    </div>

    <!-- INTERFAZ DEL CHAT -->
    <div id="app-container">
        <!-- Barra Lateral -->
        <aside>
            <div class="sidebar-top">
                <h3>Canales</h3>
                <div class="chat-list-item">
                    <i class="fa-regular fa-comments"></i>
                    <span>Chat Principal</span>
                </div>
            </div>
            
            <div class="sidebar-bottom">
                <div class="sidebar-actions">
                    <button class="btn-danger" onclick="clearChat()">
                        <i class="fa-solid fa-trash-can"></i> Vaciar Chat
                    </button>
                    <button class="btn-secondary" onclick="logout()">
                        <i class="fa-solid fa-sign-out-alt"></i> Cerrar Sesión
                    </button>
                </div>
                <div class="user-info">
                    <div id="current-avatar" class="avatar"></div>
                    <div>
                        <div id="current-username" style="font-weight: bold;"></div>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">En línea</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Ventana de Mensajes -->
        <main>
            <header>
                <h2>Sala: Realeza Privada</h2>
                <span style="color: var(--text-muted); font-size: 0.9rem;">Cifrado Local Activo</span>
            </header>

            <div id="chat-window">
                <!-- Mensajes dinámicos -->
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="message-input" placeholder="Envía un mensaje seguro..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane fa-lg"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const PASS_REQ = "123456789!";
        let currentUser = null;
        let lastMessageCount = 0;
        let pollingInterval = null;

        // --- ENCRIPTACIÓN ---
        function encryptMessage(text) {
            let reversed = text.split("").reverse().join("");
            return btoa(unescape(encodeURIComponent(reversed)));
        }

        function decryptMessage(cipher) {
            try {
                let decoded = decodeURIComponent(escape(atob(cipher)));
                return decoded.split("").reverse().join("");
            } catch(e) {
                return "[Error al desencriptar mensaje]";
            }
        }

        // --- MANEJO DE LINKS ---
        function formatText(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        }

        // --- BASE DE DATOS LOCAL ---
        function getRawMessages() {
            const db = localStorage.getItem('royal_chat_db');
            return db ? JSON.parse(db) : [];
        }

        function loadMessages() {
            const encryptedMessages = getRawMessages();
            
            if (encryptedMessages.length === lastMessageCount) return;
            lastMessageCount = encryptedMessages.length;

            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML = ''; 

            encryptedMessages.forEach(msg => {
                const decryptedText = decryptMessage(msg.payload);
                const formattedText = formatText(decryptedText);
                
                const isMe = msg.sender === currentUser;
                const avatarClass = msg.sender === "Príncipe" ? "prince" : "princess";
                const avatarInitials = msg.sender === "Príncipe" ? "P" : "Pr";

                const msgRow = document.createElement('div');
                msgRow.className = `message-row ${isMe ? 'sent-row' : 'received-row'}`;

                msgRow.innerHTML = `
                    <div class="avatar ${avatarClass}">${avatarInitials}</div>
                    <div class="message-content">
                        <div class="sender-name">${msg.sender}</div>
                        <div class="message-text">${formattedText}</div>
                        <div class="timestamp">${msg.time}</div>
                    </div>
                `;
                chatWindow.appendChild(msgRow);
            });

            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            const encryptedPayload = encryptMessage(text);
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const newMsg = {
                sender: currentUser,
                payload: encryptedPayload,
                time: timeString
            };

            const allMessages = getRawMessages();
            allMessages.push(newMsg);
            localStorage.setItem('royal_chat_db', JSON.stringify(allMessages));

            input.value = '';
            loadMessages();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // --- INICIALIZACIÓN Y PERSISTENCIA REAL ---
        function tryLogin() {
            const selectedUser = document.getElementById('user-select').value;
            const passInput = document.getElementById('password-input').value;
            const errorDiv = document.getElementById('login-error');

            if (passInput === PASS_REQ) {
                localStorage.setItem('active_chat_user', selectedUser); // Guardado permanente a nivel de dominio
                errorDiv.style.display = 'none';
                initApp(selectedUser);
            } else {
                errorDiv.style.display = 'block';
            }
        }

        function initApp(user) {
            currentUser = user;
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';

            document.getElementById('current-username').innerText = currentUser;
            const avatar = document.getElementById('current-avatar');
            avatar.innerText = currentUser === "Príncipe" ? "P" : "Pr";
            avatar.className = `avatar ${currentUser === "Príncipe" ? "prince" : "princess"}`;

            // Resetear contador para forzar renderizado limpio al cambiar de usuario o refrescar
            lastMessageCount = 0;
            loadMessages();
            
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(loadMessages, 1000);
        }

        function logout() {
            localStorage.removeItem('active_chat_user'); // Borrar sesión activa
            clearInterval(pollingInterval);
            location.reload(); 
        }

        function clearChat() {
            if (confirm("¿Estás seguro de que deseas vaciar todo el historial de chat de forma permanente?")) {
                localStorage.setItem('royal_chat_db', JSON.stringify([]));
                lastMessageCount = 0;
                loadMessages();
            }
        }

        // CONTROL INMEDIATO DE SESIÓN ANTES DE MOSTRAR INTERFAZ
        (function checkSession() {
            const savedUser = localStorage.getItem('active_chat_user');
            if (savedUser) {
                // Pequeño truco para saltar visualmente el login antes de que se dibuje
                document.addEventListener("DOMContentLoaded", function() {
                    initApp(savedUser);
                });
            }
        })();
    </script>
</body>
</html>
